<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Incident | AntiBooking</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <div id="siteHeader"></div>
  <section class="page-hero">
    <div class="page-hero-inner">
      <h1>Report Incident</h1>
      <p>Submit a tourism-related antisemitic or discriminatory incident for moderation.</p>
    </div>
  </section>
  <main class="main">
    <section class="form-section">
      <div class="panel">
        <h2>Submit a factual report</h2>
        <p>V2: this form now writes directly to Supabase instead of sending only an email.</p>
        <div class="notice">Reports are reviewed before publication.</div>
      </div>
      <form class="panel" id="reportForm">
        <div class="form-grid">
          <div class="input-box"><label>Place / company name</label><input name="place_name" required /></div>
          <div class="input-box"><label>Category</label><select name="category" required><option>Hotel</option><option>Restaurant</option><option>Taxi / Transport</option><option>Museum / Attraction</option><option>Airbnb / Rental</option><option>Airport Service</option><option>Other</option></select></div>
          <div class="input-box"><label>Country</label><input name="country" required /></div>
          <div class="input-box"><label>City</label><input name="city" required /></div>
          <div class="input-box"><label>Incident date</label><input type="date" name="incident_date" /></div>
          <div class="input-box"><label>Your email</label><input type="email" name="reporter_email" required /></div>
          <div class="input-box full"><label>Evidence link</label><input name="evidence_link" placeholder="News article, social post, Google Drive, screenshot URL..." /></div>
          <div class="input-box full"><label>Evidence file</label><input type="file" name="evidence_file" accept="image/*,.pdf,.doc,.docx" /></div>
          <div class="input-box full"><label>Description</label><textarea name="description" required></textarea></div>
          <div class="input-box full"><label>Publication consent</label><select name="publication_consent" required><option>I agree that AntiBooking may review and publish a moderated version of this report</option><option>Review only - contact me before publication</option></select></div>
          <div class="full"><button class="btn btn-primary" id="submitReportButton" type="submit" style="width:100%; padding:16px;">Submit report for moderation</button></div>
          <p id="reportStatus" class="full" style="font-weight:900;"></p>
        </div>
      </form>
    </section>
  </main>
  <div id="siteFooter"></div>
  <script src="/assets/js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-config.js"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/js/report-supabase.js"></script>
</body>
</html>
