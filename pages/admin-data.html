<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Data | Jooking</title>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <link rel="stylesheet" href="/assets/css/header-fix.css"/>
  <link rel="stylesheet" href="/assets/css/footer-fix.css"/>
  <link rel="stylesheet" href="/assets/css/mobile-fix.css"/>
  <link rel="stylesheet" href="/assets/css/admin-data.css"/>
</head>
<body>
  <div id="siteHeader"></div>
  <main class="admin-data-page">
    <section class="admin-data-hero">
      <h1>Admin Data Manager</h1>
      <p>Add, validate, update and clean Jooking records directly from the website.</p>
      <div id="adminAuthBox" class="admin-auth-box">Checking admin session...</div>
    </section>
    <section class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTable('incidents')">Risks / Incidents</button>
      <button class="admin-tab" onclick="switchAdminTable('friendly_places')">Friendly Places</button>
      <button class="admin-tab" onclick="switchAdminTable('ai_leads')">AI Leads</button>
      <button class="admin-tab" onclick="switchAdminTable('reports')">Submitted Reports</button>
    </section>
    <section class="admin-filter-card">
      <div class="admin-filter-grid">
        <div><label>Search</label><input id="adminSearch" placeholder="Place, city, country, source..." oninput="renderAdminRows()"/></div>
        <div><label>Status</label><select id="filterStatus" onchange="renderAdminRows()"><option value="all">All</option><option value="approved">approved</option><option value="needs_verification">needs_verification</option><option value="draft">draft</option><option value="rejected">rejected</option></select></div>
        <div><label>Completeness</label><select id="filterCompleteness" onchange="renderAdminRows()"><option value="all">All records</option><option value="missing_city">Missing city</option><option value="missing_date">Missing date</option><option value="missing_url">Missing URL</option><option value="missing_details">Missing details</option><option value="missing_source">Missing source label</option><option value="complete">Complete enough</option></select></div>
        <div><label>Category</label><select id="filterCategory" onchange="renderAdminRows()"><option value="all">All categories</option></select></div>
        <div><label>Country</label><select id="filterCountry" onchange="renderAdminRows()"><option value="all">All countries</option></select></div>
        <div class="admin-filter-actions"><button class="btn btn-light" onclick="resetAdminFilters()">Reset</button><button class="btn btn-primary" onclick="loadAdminRows()">Refresh</button></div>
      </div>
      <div class="admin-stats" id="adminStats">Loading stats...</div>
    </section>
    <section class="admin-editor-grid">
      <div class="admin-form-card">
        <h2 id="adminFormTitle">New risk report</h2>
        <form id="adminDataForm">
          <input type="hidden" name="id"/>
          <div class="admin-row"><label>Status</label><select name="status"><option value="approved">approved</option><option value="needs_verification">needs_verification</option><option value="draft">draft</option><option value="rejected">rejected</option></select></div>
          <div class="admin-row"><label>Place name</label><input name="place_name" required/></div>
          <div class="admin-row two">
            <div>
              <label>Category</label>
              <select name="category" required>
                <option value="Hotel">Hotel</option>
                <option value="Restaurant">Restaurant</option>
                <option value="Taxi / Transport">Taxi / Transport</option>
                <option value="Attraction">Attraction</option>
                <option value="Store">Store</option>
                <option value="Airbnb / Rental">Airbnb / Rental</option>
                <option value="Airport Service">Airport Service</option>
                <option value="Harassment / Atmosphere">Harassment / Atmosphere</option>
              </select>
            </div>
            <div><label>Country</label><input name="country" required/></div>
          </div>
          <div class="admin-row two"><div><label>City</label><input name="city"/></div><div><label>Incident date</label><input name="incident_date" type="date"/></div></div>
          <div class="admin-row"><label>Confidence / evidence quality / badge</label><input name="confidence"/></div>
          <div class="admin-row"><label>Summary</label><textarea name="summary" rows="3"></textarea></div>
          <div class="admin-row"><label>Details</label><textarea name="details" rows="5"></textarea></div>
          <div class="admin-row two"><div><label>Source label</label><input name="source_label"/></div><div><label>Source URL</label><input name="source_url"/></div></div>
          <div class="admin-row friendly-only"><label>Website</label><input name="website"/></div>
          <div class="admin-row friendly-only"><label>Friendly badge</label><input name="badge" placeholder="Verified Friendly"/></div>
          <div class="admin-actions">
            <button class="btn btn-primary" type="submit">Save</button>
            <button class="btn btn-light" type="button" onclick="clearAdminForm()">New</button>
            <button class="btn btn-danger" type="button" onclick="deleteCurrentRecord()">Delete</button>
            <button class="btn btn-light ai-only" type="button" onclick="approveLeadToIncident()">Approve → Incident</button>
          </div>
          <p id="adminSaveStatus"></p>
        </form>
      </div>
      <div class="admin-list-card">
        <div class="admin-list-head">
          <h2 id="adminListTitle">Risks</h2>
          <div class="admin-small-actions"><button class="btn btn-light" onclick="showOnlyIncomplete()">Incomplete only</button><button class="btn btn-light" onclick="showNeedsVerification()">Needs verification</button></div>
        </div>
        <div id="adminRows" class="admin-rows">Loading...</div>
      </div>
    </section>
  </main>
  <div id="siteFooter"></div>
  <script src="/assets/js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-config.js"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script src="/assets/js/admin-data.js"></script>
</body>
</html>
