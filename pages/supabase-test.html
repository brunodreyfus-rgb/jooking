<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Connection Test | Jooking</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <main class="main" style="max-width:900px;margin:40px auto;">
    <h1>Supabase Connection Test</h1>
    <p>This page tests whether the public website can reach Supabase and read the incidents table.</p>
    <pre id="out" style="white-space:pre-wrap;background:#f3f4f6;padding:16px;border-radius:12px;"></pre>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase-config.js"></script>
  <script src="/assets/js/supabase-client.js"></script>
  <script>
    (async function () {
      const lines = [];
      const add = (msg) => lines.push(msg);
      const out = document.getElementById('out');
      add('Current URL: ' + window.location.href);
      add('Supabase library loaded: ' + Boolean(window.supabase));
      add('SUPABASE_URL: ' + (typeof SUPABASE_URL !== 'undefined' ? SUPABASE_URL : 'missing'));
      add('SUPABASE_KEY prefix: ' + (typeof SUPABASE_PUBLISHABLE_KEY !== 'undefined' ? SUPABASE_PUBLISHABLE_KEY.slice(0, 18) + '...' : 'missing'));
      add('Client created: ' + Boolean(window.antibookingSupabase || (typeof antibookingSupabase !== 'undefined' && antibookingSupabase)));
      try {
        const client = window.antibookingSupabase || antibookingSupabase;
        const { data, error } = await client.from('incidents').select('id,place_name,status').limit(3);
        if (error) add('FAILED: ' + error.message);
        else add('SUCCESS: read ' + data.length + ' incident row(s). Sample: ' + JSON.stringify(data, null, 2));
      } catch (err) {
        add('FAILED: ' + (err && err.message ? err.message : String(err)));
      }
      out.textContent = lines.join('\n');
    })();
  </script>
</body>
</html>
